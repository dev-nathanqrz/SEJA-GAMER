<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento Seguro — LOUD & Fluxo</title>
  <style>
    :root {
      --neon-green: #00ff66;
      --neon-glow: rgba(0, 255, 102, 0.3);
      --bg-dark: #02040a;
      --card-bg: rgba(15, 23, 42, 0.75);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a0f2c 0%, var(--bg-dark) 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Container principal estilizado estilo vidro/neon */
    .main-card {
      background: var(--card-bg);
      border: 1px solid rgba(0, 255, 102, 0.2);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 40px 30px;
      width: 100%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px var(--neon-glow);
      animation: fadeIn 0.8s ease-in-out;
      margin-bottom: 20px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
      background: linear-gradient(to right, #ffffff, #a5f3fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 1.05rem;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    /* Container de pagamento ajustado */
    .payment-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
      margin-bottom: 25px;
    }

    .logo-loud {
      width: 140px;
      height: auto;
      border-radius: 14px;
      box-shadow: 0 0 20px rgba(0, 255, 102, 0.4);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .logo-loud:hover {
      transform: scale(1.03);
      box-shadow: 0 0 30px var(--neon-green);
    }

    .btn-pix {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      padding: 16px 32px;
      border: none;
      border-radius: 12px;
      font-size: 1.15rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      width: 100%;
      max-width: 320px;
      letter-spacing: 0.5px;
    }

    .btn-pix:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(16, 185, 129, 0.5);
      filter: brightness(1.1);
    }

    .btn-pix:active {
      transform: translateY(1px);
    }

    /* Moldura elegante do QR Code em miniatura */
    .qr-thumb-container {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 12px;
      display: inline-block;
      border: 1px dashed rgba(0, 255, 102, 0.3);
      margin-top: 10px;
    }

    .qr-thumb {
      display: block;
      width: 100%;
      max-width: 160px;
      border-radius: 8px;
    }

    /* Selo de segurança redesenhado */
    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      color: #64748b;
      font-size: 0.85rem;
    }

    .security-badge svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* Modal Premium (Janela de pagamento) */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(2, 4, 10, 0.85);
      backdrop-filter: blur(8px);
      animation: modalFadeIn 0.4s ease;
    }

    @keyframes modalFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: var(--card-bg);
      border: 1px solid rgba(0, 255, 102, 0.3);
      box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 40px rgba(0, 255, 102, 0.2);
      margin: 12% auto;
      padding: 30px 20px;
      border-radius: 20px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      color: white;
      position: relative;
    }

    .close {
      color: #94a3b8;
      position: absolute;
      right: 20px;
      top: 15px;
      font-size: 26px;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .close:hover {
      color: #ef4444;
    }

    .modal-content h2 {
      font-size: 1.4rem;
      margin-bottom: 10px;
      color: var(--neon-green);
    }

    .modal-content p {
      font-size: 0.95rem;
      margin-bottom: 20px;
    }

    .qr-code-large {
      max-width: 220px;
      border-radius: 12px;
      border: 4px solid #ffffff;
      box-shadow: 0 0 25px rgba(0, 255, 102, 0.4);
      margin-bottom: 15px;
    }

    .modal-footer {
      font-size: 0.8rem;
      color: #38bdf8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="main-card">
    <h1>🔥 Garanta seu produto agora!</h1>
    <p>📲 Pague via Pix em segundos e receba imediatamente!</p>

    <div class="payment-wrapper">
      <img src="857f3d5b5250c6a5b28bb9ec72a9b6f3.jpg" alt="Logo Organização" class="logo-loud">
      
      <button class="btn-pix" onclick="openModal()">💳 Pagar com Pix Agora</button>
    </div>

    <div class="qr-thumb-container">
      <p style="font-size:0.75rem; margin-bottom:6px; color:#64748b;">Escaneie para conferir</p>
      <img src="qrcode-pix.png" alt="Prévia QR Code" class="qr-thumb">
    </div>

    <div class="security-badge">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-4zM10.5 17.5l-4.5-4.5 1.5-1.5 3 3 7-7 1.5 1.5-8.5 8.5z"/></svg>
      <span>Checkout 100% Seguro e Criptografado</span>
    </div>
  </div>

  <div id="pixModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2>Pagamento via Pix</h2>
      <p>Aponte a câmera do seu banco para o código:</p>
      
      <img src="qrcode-pix.png" alt="QR Code PIX" class="qr-code-large">
      
      <p>⚡ Acesso liberado imediatamente após a confirmação!</p>
      
      <div class="modal-footer">
        <svg style="width:14px;height:14px;fill:currentColor" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12S6.5 22 12 22 22 17.5 22 12 17.5 2 12 2M13 17H11V15H13V17M13 13H11V7H13V13Z"/></svg>
        <span>Ambiente de pagamentos blindado</span>
      </div>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById("pixModal").style.display = "block";
    }
    function closeModal() {
      document.getElementById("pixModal").style.display = "none";
    }

    // Fecha o modal ao clicar fora da caixa (na área escura)
    window.onclick = function(event) {
      const modal = document.getElementById("pixModal");
      if (event.target == modal) {
        modal.style.display = "none";
      }
    }
  </script>

</body>
</html>
